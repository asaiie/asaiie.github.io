<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>asaiie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'EB Garamond', Garamond, serif;
      font-size: 19px;
      line-height: 1.6;
      color: #222;
      background: #fdfdfd;
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }
    h1 {
      font-weight: 600;
      font-size: 2.25rem;
      margin: 0 0 1rem;
    }
    hr {
      border: none;
      text-align: center;
      margin: 2.5rem 0;
    }
    hr::before {
      content: "❦";
      font-size: 1.5rem;
      color: #555;
    }
    .muted {
      color: #666;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h1>Hello, world.</h1>

  <p>This text is written in EB Garamond.</p>

  <hr>

  <p class="muted">A site by asaiie.</p>

</body>
</html>
